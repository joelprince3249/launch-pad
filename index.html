<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launchpad</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  width:100%;height:100%;
  font-family:'Inter',sans-serif;
  background:#ffffff;
  overflow:hidden;
}

/* Background overlay */
#bg-overlay{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;opacity:0;
  transition:opacity 0.5s ease;
  background-size:cover;background-position:center;
  filter:blur(45px) brightness(0.72) saturate(1.5);
  transform:scale(1.18);
}
#bg-overlay.active{opacity:0.38}

#bg-glow{
  position:fixed;inset:0;z-index:1;
  pointer-events:none;opacity:0;
  transition:opacity 0.5s ease;
  background:radial-gradient(ellipse at 50% 58%,rgba(255,255,255,0.22) 0%,transparent 62%);
}
#bg-glow.active{opacity:1}

/* Page */
.page{
  position:relative;z-index:2;
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

.site-title{
  font-size:clamp(0.55rem,1.1vw,0.8rem);
  font-weight:300;letter-spacing:0.55em;
  text-transform:uppercase;color:#bbb;
  margin-bottom:clamp(20px,3.5vh,44px);
  opacity:0;animation:fadeUp 0.5s ease 0.1s forwards;
}

/* Fan stage — bottom-anchored like the video */
/* The whole bundle sits centered horizontally */
.fan-stage{
  position:relative;
  /* wide enough to fit spread cards, height = card height + arc */
  width:clamp(300px, 70vw, 640px);
  height:clamp(260px, 55vw, 520px);
  /* do NOT use flex — cards are absolute, bottom-anchored */
}

/* Card */
.card{
  position:absolute;
  /* bottom anchor — like a held hand of cards */
  top:50%;
  /* width drives everything */
  width:clamp(75px, 11.5vw, 118px);
  aspect-ratio:9/16;
  border-radius:clamp(10px,1.3vw,16px);
  overflow:hidden;
  cursor:pointer;
  text-decoration:none;
  display:block;
  /* CRITICAL: rotate from bottom-center, matching video */
  transform-origin:50% 50%;
  box-shadow:3px 6px 24px rgba(0,0,0,0.22),0 2px 6px rgba(0,0,0,0.1);
  opacity:0;
  will-change:transform,opacity;
  /* default transition — overridden during entrance */
  transition:transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94),
             box-shadow 0.28s ease,
             filter 0.22s ease,
             opacity 0.3s ease;
}

.card-img{
  width:100%;height:100%;
  object-fit:cover;object-position:center top;
  display:block;pointer-events:none;user-select:none;
}

.card-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:20px 8px 8px;
  background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 100%);
  color:#fff;
  font-size:clamp(0.48rem,0.9vw,0.65rem);
  font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;text-align:center;
  pointer-events:none;opacity:0;
  transition:opacity 0.18s ease;
}
.card:hover .card-label{opacity:1}

/* When fan is hovered: dim non-active cards */
.fan-stage.has-hover .card:not(.card-active){
  filter:brightness(0.55) saturate(0.45);
}
.card-active{
  box-shadow:0 18px 55px rgba(0,0,0,0.38),0 4px 14px rgba(0,0,0,0.15) !important;
  z-index:99 !important;
}

.hint{
  margin-top:clamp(14px,2.5vh,30px);
  font-size:0.58rem;letter-spacing:0.28em;
  text-transform:uppercase;color:#ccc;
  opacity:0;animation:fadeUp 0.5s ease 2s forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(7px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

</div>

<script>
(function(){
  const overlay = document.getElementById('bg-overlay');
  const glow    = document.getElementById('bg-glow');
  const stage   = document.getElementById('fanStage');
  const cards   = Array.from(stage.querySelectorAll('.card'));

  // ── Fan configuration (measured from video frames) ──
  // 7 cards, bottom-anchored, transform-origin = bottom-center
  // Final resting angles — left tilts negative (CCW), right positive (CW)
  const ANGLES  = [-34, -22, -11, 0, 11, 22, 34]; // degrees
  // Horizontal position: fraction of card width from stage center-left
  // Cards overlap heavily — each step = ~52% of card width
  const X_STEP  = 0.52; // fraction of card width per card index from center
  const CENTER  = 3;    // index of center card (0-based)
  // z-index: center card on top
  const ZIDX    = [1,2,4,7,4,2,1];

  // ── Cursor influence ──
  // How much cursor proximity opens/closes the fan
  // (mimics the magnetic spreading seen in video)
  let cursorInfluence = 0; // 0=default, 1=fully open
  let rafId = null;
  let leaveTimer = null;

  function getCardX(i) {
    const cw = cards[0].offsetWidth;
    const sw = stage.offsetWidth;
    const centerLeft = sw / 2 - cw / 2;
    return centerLeft + (i - CENTER) * cw * X_STEP;
  }

  // ── Place cards in fanned position ──
  function applyFan(animate, staggerMs) {
    cards.forEach((card, i) => {
      card.style.zIndex = ZIDX[i];
      card.style.left   = getCardX(i) + 'px';

      if (animate) {
        // Stagger: each card fans out with delay
        const delay = i * staggerMs;
        card.style.transition =
          `left 0s,` +
          `transform 0.72s cubic-bezier(0.34,1.28,0.64,1) ${delay}ms,` +
          `opacity 0.38s ease ${delay}ms,` +
          `box-shadow 0.28s ease,filter 0.22s ease`;
      } else {
        card.style.transition = 'none';
      }

      card.style.transform = `translateY(-50%) rotate(${ANGLES[i]}deg)`;
      card.style.opacity   = '1';
    });
  }

  // ── Entrance: start stacked, fan out ──
  function initEntrance() {
    const cw = cards[0].offsetWidth;
    const sw = stage.offsetWidth;
    const cx = sw / 2 - cw / 2;

    // All cards stacked at center, slightly tilted left (like video frame 1)
    cards.forEach((card, i) => {
      card.style.transition = 'none';
      card.style.left       = cx + 'px';
      card.style.zIndex     = i;
      card.style.transform  = 'translateY(-50%) rotate(-8deg) scale(0.96)';
      card.style.opacity    = '0';
    });

    // Stagger fan-out: 120ms between each card (video shows ~1.5s total for 7 cards)
    setTimeout(() => applyFan(true, 115), 320);
  }

  // ── Cursor proximity: expand/contract fan ──
  // In the video, moving cursor near the fan opens it wider
  stage.addEventListener('mousemove', (e) => {
    const rect = stage.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;
    // Distance from stage center
    const cx   = rect.width  / 2;
    const cy   = rect.height / 2;
    const dist = Math.sqrt((mx-cx)**2 + (my-cy)**2);
    const maxD = Math.sqrt(cx**2 + cy**2);
    // Closer = more open
    cursorInfluence = Math.max(0, 1 - dist / (maxD * 0.8));
  });

  stage.addEventListener('mouseleave', () => {
    cursorInfluence = 0;
  });

  // ── Hover: individual card lifts ──
  cards.forEach((card, i) => {
    card.addEventListener('mouseenter', () => {
      clearTimeout(leaveTimer);
      stage.classList.add('has-hover');
      card.classList.add('card-active');

      // Background bloom
      overlay.style.backgroundImage = `url("${card.dataset.bg}")`;
      overlay.classList.add('active');
      glow.classList.add('active');

      // Lift hovered card: reduce angle, push up
      card.style.transition = 'transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.28s ease, filter 0.22s ease';
      card.style.transform  = `translateY(calc(-50% - 28px)) rotate(${ANGLES[i] * 0.15}deg) scale(1.06)`;
    });

    card.addEventListener('mouseleave', () => {
      card.classList.remove('card-active');
      stage.classList.remove('has-hover');
      // Restore fan position
      card.style.transition = 'transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.28s ease, filter 0.22s ease';
      card.style.transform  = `translateY(-50%) rotate(${ANGLES[i]}deg)`;

      leaveTimer = setTimeout(() => {
        overlay.classList.remove('active');
        glow.classList.remove('active');
      }, 180);
    });

    // Click: scale down then open
    card.addEventListener('click', e => {
      e.preventDefault();
      const href = card.href;
      card.style.transition = 'transform 0.11s ease';
      card.style.transform  = `translateY(calc(-50% - 12px)) rotate(${ANGLES[i] * 0.15}deg) scale(0.91)`;
      setTimeout(() => window.open(href, '_blank'), 160);
    });
  });

  // ── Init ──
  requestAnimationFrame(() => {
    initEntrance();
  });

  window.addEventListener('resize', () => {
    cards.forEach((card, i) => {
      card.style.left = getCardX(i) + 'px';
    });
  });
})();
</script>
